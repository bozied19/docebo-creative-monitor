<!doctype html>
<html><head><meta charset="utf-8"><title>Docebo Phoenix Slides</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="deck-stage.js"></script>
<style>html,body{margin:0;background:#0a0a0a}</style>
</head>
<body>
<deck-stage>
  <section data-screen-label="01 Title"><div id="s1"></div></section>
  <section data-screen-label="02 Section Break"><div id="s2"></div></section>
  <section data-screen-label="03 Big Quote"><div id="s3"></div></section>
  <section data-screen-label="04 Stat"><div id="s4"></div></section>
  <section data-screen-label="05 Comparison"><div id="s5"></div></section>
  <section data-screen-label="06 CTA"><div id="s6"></div></section>
</deck-stage>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="PhoenixSlides.jsx"></script>
<script type="text/babel">
  const S = window.PhoenixSlides;
  ReactDOM.createRoot(document.getElementById('s1')).render(<S.TitleSlide />);
  ReactDOM.createRoot(document.getElementById('s2')).render(<S.SectionBreak />);
  ReactDOM.createRoot(document.getElementById('s3')).render(<S.BigQuoteSlide />);
  ReactDOM.createRoot(document.getElementById('s4')).render(<S.StatSlide />);
  ReactDOM.createRoot(document.getElementById('s5')).render(<S.ComparisonSlide />);
  ReactDOM.createRoot(document.getElementById('s6')).render(<S.CTASlide />);
</script>
</body></html>
