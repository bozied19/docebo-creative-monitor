<!doctype html>
<html><head><meta charset="utf-8"><title>06 CTA</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#000;overflow:hidden}
.frame{position:relative;width:1920px;height:1080px;transform-origin:top left}
</style></head>
<body>
<div class="frame" id="frame"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="PhoenixSlides.jsx"></script>
<script type="text/babel">
  const S = window.PhoenixSlides;
  ReactDOM.createRoot(document.getElementById('frame')).render(<S.CTASlide />);
  // scale 1920x1080 to viewport
  function fit(){
    const f=document.getElementById('frame');
    const sx=window.innerWidth/1920, sy=window.innerHeight/1080;
    const sc=Math.min(sx,sy);
    f.style.transform='scale('+sc+')';
  }
  window.addEventListener('resize',fit); fit();
</script>
</body></html>
