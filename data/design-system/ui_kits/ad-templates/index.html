<!doctype html>
<html><head><meta charset="utf-8"><title>Docebo Phoenix — Ad Template Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; background: #1a1a1a; font-family: var(--ff-body); color: #fff; }
  .header { padding: 40px 64px 24px; }
  .header h1 { font-family: var(--ff-display); font-style: italic; font-size: 48px; margin: 0; letter-spacing: -0.02em; }
  .header p { color: rgba(255,255,255,0.6); font-size: 16px; margin: 8px 0 0; max-width: 800px; }
  .grid { display: flex; flex-direction: column; gap: 56px; padding: 32px 64px 96px; }
  .item { display: flex; flex-direction: column; gap: 16px; }
  .meta { display: flex; align-items: baseline; gap: 16px; font-family: var(--ff-mono); }
  .meta .name { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .meta .dim { font-size: 12px; color: rgba(255,255,255,0.5); }
  .meta .desc { font-size: 13px; color: rgba(255,255,255,0.65); margin-left: auto; max-width: 480px; text-align: right; }
  /* The 1920×1080 stage scaled to 1280px wide for preview */
  .stage { width: 1280px; height: 720px; overflow: hidden; border-radius: 8px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); position: relative; }
  .stage-inner { transform: scale(0.6667); transform-origin: top left; }
</style>
</head>
<body>
<div class="header">
  <h1>Phoenix Ad Template Kit</h1>
  <p>Five canonical layouts from the 2026 Docebo Phoenix reskin. Each renders at 1920×1080 in the source; previewed at ⅔ scale here. Edit content via component props in <code style="font-family:var(--ff-mono); color:#FF5DD8">Templates.jsx</code>.</p>
</div>
<div class="grid" id="grid"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="PhoenixBanner.jsx"></script>
<script type="text/babel" src="Templates.jsx"></script>
<script type="text/babel">
  const T = window.PhoenixTemplates;
  const items = [
    { name: '01 · Webinar / Product Release', dim: '1920 × 1080 · Navy + Pink Rock', desc: 'The most-used layout. Italic headline upper-left, geometric pink rock right, mono eyebrow above, outline pill CTA bottom-left, wordmark bottom-right.', Comp: T.WebinarNavyPink },
    { name: '02 · DU Live · Speakers', dim: '1920 × 1080 · Beige + Lime accent', desc: 'Event banner with up to 3 speaker rows on the right, navy hero left, lime diagonal slash bottom-left.', Comp: T.DULiveSpeakers },
    { name: '03 · Data-as-Power', dim: '1920 × 1080 · Midnight + Lime', desc: 'Big italic stat over a data grid. Stat-pulse animation strategy lives here. Used for report launches and ROI proof.', Comp: T.DataAsPower },
    { name: '04 · Rebellious Editorial', dim: '1920 × 1080 · Marble + Pink', desc: 'UPPERCASE italic headline with oversized asterisk and Lora-italic footnote. Provocateur voice only.', Comp: T.RebelliousEditorial },
    { name: '05 · Co-brand · Partner', dim: '1920 × 1080 · Beige + Lockup', desc: 'docebo | partner lockup with vertical divider, pink rock right, navy CTA. Reverse partner logo by default per Figma rule.', Comp: T.CoBrandPartner },
  ];
  function App() {
    return (
      <>
        {items.map((it, i) => (
          <div className="item" key={i}>
            <div className="meta">
              <span className="name">{it.name}</span>
              <span className="dim">{it.dim}</span>
              <span className="desc">{it.desc}</span>
            </div>
            <div className="stage"><div className="stage-inner"><it.Comp /></div></div>
          </div>
        ))}
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('grid')).render(<App />);
</script>
</body></html>
