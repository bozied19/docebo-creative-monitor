<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#131E29;font-family:var(--ff-body);color:#fff;display:flex;gap:14px;flex-wrap:wrap}

.chip{padding:6px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;font-family:var(--ff-mono);font-size:12px;color:rgba(255,255,255,0.7)}
.lab{font-family:var(--ff-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.5;margin:0 0 8px;flex-basis:100%}
</style></head>
<body>
<div class="lab">Customer logo bar (proof)</div>
<div class="lb">
  <div class="lg">Zoom</div><div class="lg">Samsung</div><div class="lg">Pret</div><div class="lg">La-Z-Boy</div><div class="lg">Walmart</div>
</div>
<div class="lab" style="margin-top:14px">Capability chips (data-as-power)</div>
<div class="lb"><div class="chip">3.2x ROI</div><div class="chip">60% faster</div><div class="chip">Audit-ready</div><div class="chip">AI-native</div></div>
