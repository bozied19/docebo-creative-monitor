<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#0033A0;color:#fff;font-family:var(--ff-body);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn{padding:12px 22px;border-radius:999px;font-family:var(--ff-mono);font-weight:600;font-size:13px;letter-spacing:0.02em;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.solid-pink{background:#FF5DD8;color:#0033A0}
.solid-green{background:#54FA77;color:#131E29}
.outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4)}
.outline-pink{background:transparent;color:#FF5DD8;border:1px solid rgba(255,93,216,0.4)}
.solid-purple{background:#7E2EE9;color:#fff}
.label{width:100%;font-family:var(--ff-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;opacity:0.5;margin-bottom:4px}
</style></head>
<body>
<div class="label">CTA buttons · always end with →</div>
<div class="btn solid-pink">Book a demo →</div>
<div class="btn solid-green">See the data →</div>
<div class="btn outline">Discover how →</div>
<div class="btn outline-pink">Read case study →</div>
<div class="btn solid-purple">Get the report →</div>
</body></html>
