<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:#0033A0;font-family:var(--ff-body);color:#fff;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.proof{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;border:1px solid rgba(255,93,216,0.3);background:rgba(255,93,216,0.1)}
.proof svg{width:22px;height:22px}
.rate{display:flex;align-items:baseline;gap:6px}
.rate .num{font-family:var(--ff-display);font-style:italic;font-weight:400;font-size:22px;color:#fff;line-height:1}
.rate .src{font-family:var(--ff-mono);font-weight:600;font-size:11px;color:#FF5DD8;text-transform:uppercase}
.lab{font-family:var(--ff-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.6}
.metric{padding:14px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);text-align:center}
.metric .v{font-family:var(--ff-display);font-style:italic;font-size:32px;color:#54FA77;line-height:1.05}
.metric .l{font-family:var(--ff-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.6;margin-top:4px}
</style></head>
<body>
<div class="proof">
<svg viewBox="0 0 24 24" fill="#FF5DD8"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm-1 14l-3.5-3.5 1.41-1.41L11 13.17l5.09-5.09L17.5 9.5 11 16z"/></svg>
<div><div class="rate"><span class="num">4.5</span><span class="src">G2</span></div><div class="lab">Leader</div></div>
</div>
<div class="metric"><div class="v">94%</div><div class="l">Completion</div></div>
<div class="metric"><div class="v">3.2x</div><div class="l">ROI</div></div>
<div class="metric"><div class="v">60%</div><div class="l">Faster</div></div>
</body></html>
