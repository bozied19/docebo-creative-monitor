<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:#0033A0;font-family:var(--ff-body);display:flex;gap:14px;flex-wrap:wrap;align-items:center;color:#fff}
.btn{font-family:var(--ff-body);font-weight:600;font-size:14px;padding:12px 22px;border-radius:999px;cursor:pointer;border:0;letter-spacing:-0.005em}
.solid-pink{background:#FF5DD8;color:#06065D}
.solid-green{background:#E3FFAB;color:#106D24}
.solid-lav{background:#DCB7FF;color:#3C0F7D}
.outline-light{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.6)}
.mono-on-dark{font-family:var(--ff-mono);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;padding:10px 18px;border-radius:4px;background:transparent;color:#FF5DD8;border:1px solid rgba(255,93,216,0.5);text-shadow:0 0 8px rgba(255,93,216,0.4)}
</style></head>
<body>
<button class="btn solid-pink">Book a demo →</button>
<button class="btn solid-green">See the data →</button>
<button class="btn solid-lav">Discover how →</button>
<button class="btn outline-light">Watch demo →</button>
<button class="mono-on-dark">SEE PLATFORM →</button>
</body></html>
