<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:#0A0A0A;font-family:var(--ff-body);min-height:100vh;display:flex;align-items:center;justify-content:center;gap:32px}
.chip{padding:14px 26px;border-radius:999px;font-family:var(--ff-mono);font-weight:600;font-size:13px;letter-spacing:0.04em;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18)}
.pink{color:#FF5DD8;text-shadow:0 0 18px rgba(255,93,216,0.7);box-shadow:0 0 32px rgba(255,93,216,0.45),inset 0 0 0 1px rgba(255,93,216,0.4)}
.blue{color:#0057FF;text-shadow:0 0 18px rgba(0,87,255,0.7);box-shadow:0 0 32px rgba(0,87,255,0.45),inset 0 0 0 1px rgba(87,190,255,0.5)}
.green{color:#54FA77;text-shadow:0 0 18px rgba(84,250,119,0.7);box-shadow:0 0 32px rgba(84,250,119,0.45),inset 0 0 0 1px rgba(84,250,119,0.4)}
.lav{color:#DCB7FF;text-shadow:0 0 18px rgba(220,183,255,0.7);box-shadow:0 0 32px rgba(220,183,255,0.55),inset 0 0 0 1px rgba(220,183,255,0.4)}
</style></head>
<body>
<div class="chip pink">PINK GLOW</div>
<div class="chip blue">BLUE GLOW</div>
<div class="chip green">GREEN GLOW</div>
<div class="chip lav">LAVENDER GLOW</div>
</body></html>
