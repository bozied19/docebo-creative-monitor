<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#0033A0;color:#fff;font-family:var(--ff-body)}

<body>
<div class="row"><div class="spec">Hero · 92px</div><div class="h" style="font-size:64px">Train smarter.</div></div>
<div class="row"><div class="spec">H1 · 56px</div><div class="h" style="font-size:44px">Win bigger.</div></div>
<div class="row"><div class="spec">H2 · 40px</div><div class="h" style="font-size:32px">Audit-ready.</div></div>
<div class="row" style="border:0"><div class="spec">H3 · 28px</div><div class="h" style="font-size:24px;color:#FF5DD8">Built for outcomes.</div></div>
