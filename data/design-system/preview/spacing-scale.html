<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#F6F5F2;font-family:var(--ff-body)}
.row{display:flex;align-items:flex-end;gap:16px;height:90px}
.b{background:#0033A0;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-family:var(--ff-mono);font-size:10px;padding-bottom:4px}
.lab{font-family:var(--ff-mono);font-size:9px;color:#56534E;text-transform:uppercase;text-align:center;margin-top:4px}
.col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body class="phx-base">
<div class="row">
<div class="col"><div class="b" style="width:4px;height:4px"></div><div class="lab">1·4</div></div>
<div class="col"><div class="b" style="width:8px;height:8px"></div><div class="lab">2·8</div></div>
<div class="col"><div class="b" style="width:12px;height:12px"></div><div class="lab">3·12</div></div>
<div class="col"><div class="b" style="width:16px;height:16px"></div><div class="lab">4·16</div></div>
<div class="col"><div class="b" style="width:24px;height:24px"></div><div class="lab">5·24</div></div>
<div class="col"><div class="b" style="width:32px;height:32px"></div><div class="lab">6·32</div></div>
<div class="col"><div class="b" style="width:48px;height:48px"></div><div class="lab">7·48</div></div>
<div class="col"><div class="b" style="width:64px;height:64px"></div><div class="lab">8·64</div></div>
<div class="col"><div class="b" style="width:90px;height:90px"></div><div class="lab">9·96</div></div>
</div>
</body></html>
