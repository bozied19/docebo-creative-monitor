<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:#F6F5F2;font-family:var(--ff-body);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{font-family:var(--ff-body);font-weight:600;font-size:14px;padding:12px 22px;border-radius:999px;cursor:pointer;border:0;letter-spacing:-0.005em}
.primary{background:#0033A0;color:#fff}
.purple{background:#7E2EE9;color:#fff}
.outline-dark{background:transparent;color:#0033A0;border:1.5px solid #0033A0}
.mono{font-family:var(--ff-mono);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;padding:10px 18px;border-radius:6px;background:transparent;color:#0033A0;border:1px solid rgba(0,51,160,0.3)}
.ghost{background:transparent;color:#0033A0;border:0;font-weight:600}
</style></head>
<body class="phx-base">
<button class="btn primary">Book a demo →</button>
<button class="btn purple">See the data →</button>
<button class="btn outline-dark">Discover how →</button>
<button class="mono">SEE PLATFORM →</button>
<button class="btn ghost">Learn more →</button>
</body></html>
