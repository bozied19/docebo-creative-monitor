<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--phx-marble-50);font-family:var(--ff-body)}
.row{display:flex;gap:0;margin-bottom:6px}
.sw{flex:1;height:64px;display:flex;align-items:flex-end;padding:8px;color:#fff;font-family:var(--ff-mono);font-size:10px}
.sw.dark{color:var(--phx-marble-900)}
.label{font-family:var(--ff-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--phx-marble-700);margin-bottom:6px}
</style></head>
<body class="phx-base">
<div class="label">Marble (warm neutrals)</div>
<div class="row">
<div class="sw dark" style="background:#F6F5F2">50</div>
<div class="sw dark" style="background:#EBE6DD">100</div>
<div class="sw dark" style="background:#E1DBD2">200</div>
<div class="sw" style="background:#807B74">500</div>
<div class="sw" style="background:#56534E">700</div>
<div class="sw" style="background:#2A2923">900</div>
</div>
<div class="label">Blue</div>
<div class="row">
<div class="sw dark" style="background:#DBF2FF">50</div>
<div class="sw dark" style="background:#A4DFFF">100</div>
<div class="sw dark" style="background:#57BEFF">300</div>
<div class="sw" style="background:#2E8CFF">500</div>
<div class="sw" style="background:#0057FF">700</div>
<div class="sw" style="background:#002B80">900</div>
</div>
<div class="label">Green</div>
<div class="row">
<div class="sw dark" style="background:#E3FFAB">50</div>
<div class="sw dark" style="background:#9EFF86">100</div>
<div class="sw dark" style="background:#54FA77">500</div>
<div class="sw" style="background:#1EB83F">700</div>
<div class="sw" style="background:#106D24">800</div>
<div class="sw" style="background:#053812">900</div>
</div>
<div class="label">Purple / Pink</div>
<div class="row">
<div class="sw dark" style="background:#E9D7FF">50</div>
<div class="sw dark" style="background:#DCB7FF">100</div>
<div class="sw" style="background:#7E2EE9">500</div>
<div class="sw" style="background:#5D1EBC">700</div>
<div class="sw" style="background:#3C0F7D">800</div>
<div class="sw" style="background:#FF5DD8">P500</div>
</div>
</body></html>
