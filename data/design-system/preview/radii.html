<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#F6F5F2;font-family:var(--ff-body)}
.row{display:flex;gap:18px;align-items:flex-end}
.box{width:80px;height:80px;background:#0033A0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--ff-mono);font-size:10px;letter-spacing:0.04em}
.lab{font-family:var(--ff-mono);font-size:9px;color:#56534E;text-transform:uppercase;text-align:center;margin-top:6px}
.col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body class="phx-base">
<div class="row">
<div class="col"><div class="box" style="border-radius:0">0</div><div class="lab">SHARP · 0</div></div>
<div class="col"><div class="box" style="border-radius:4px">XS</div><div class="lab">XS · 4</div></div>
<div class="col"><div class="box" style="border-radius:6px">SM</div><div class="lab">SM · 6</div></div>
<div class="col"><div class="box" style="border-radius:10px">MD</div><div class="lab">MD · 10</div></div>
<div class="col"><div class="box" style="border-radius:14px">LG</div><div class="lab">LG · 14</div></div>
<div class="col"><div class="box" style="border-radius:24px">XL</div><div class="lab">XL · 24</div></div>
<div class="col"><div class="box" style="border-radius:999px;width:120px">PILL</div><div class="lab">PILL · 999</div></div>
</div>
</body></html>
