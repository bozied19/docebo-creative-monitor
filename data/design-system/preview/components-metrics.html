<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#0033A0;color:#fff;font-family:var(--ff-body);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.chip{padding:6px 12px;border-radius:6px;font-family:var(--ff-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.06em;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7)}
.metric{display:flex;flex-direction:column;align-items:flex-start;padding:0 12px;border-left:2px solid #54FA77}
.metric .v{font-family:var(--ff-display);font-style:italic;font-size:42px;line-height:1;color:#54FA77}
.metric .l{font-family:var(--ff-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.5;margin-top:4px}
.label{width:100%;font-family:var(--ff-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;opacity:0.5;margin-bottom:4px}
</style></head>
<body>
<div class="label">Stat chips & metric strip</div>
<div class="chip">3.2x ROI</div>
<div class="chip">94% completion</div>
<div class="chip">60% faster</div>
<div class="chip">Audit-ready</div>
<div class="metric"><div class="v">94%</div><div class="l">Completion</div></div>
<div class="metric" style="border-color:#FF5DD8"><div class="v" style="color:#FF5DD8">3.2x</div><div class="l">ROI</div></div>
</body></html>
