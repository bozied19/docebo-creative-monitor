<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:#F6F5F2;font-family:var(--ff-body)}
.row{display:flex;gap:32px;align-items:center;margin-bottom:18px}
.card{width:140px;height:80px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:11px;color:#0033A0}
.s1{box-shadow:0 1px 2px rgba(6,6,96,0.08)}
.s2{box-shadow:0 6px 18px rgba(6,6,96,0.10)}
.s3{box-shadow:0 18px 48px rgba(6,6,96,0.18)}
.lab{font-family:var(--ff-mono);font-size:10px;color:#56534E;text-transform:uppercase;letter-spacing:0.05em}
</style></head>
<body class="phx-base">
<div class="row"><div class="card s1">Shadow 1</div><div class="lab">--shadow-1 · 0 1 2 navy/8</div></div>
<div class="row"><div class="card s2">Shadow 2</div><div class="lab">--shadow-2 · 0 6 18 navy/10</div></div>
<div class="row"><div class="card s3">Shadow 3</div><div class="lab">--shadow-3 · 0 18 48 navy/18</div></div>
</body></html>
