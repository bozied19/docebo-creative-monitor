<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:linear-gradient(165deg,#0057FF 0%,#7E2EE9 50%,#B627C6 100%);color:#fff;font-family:var(--ff-body);min-height:100vh}
.q{position:relative;padding-top:24px}
.q::before{content:"\201C";position:absolute;top:-22px;left:-6px;font-family:var(--ff-serif);font-size:96px;font-weight:700;line-height:1;opacity:0.95}
blockquote{margin:0;font-family:var(--ff-serif);font-style:italic;font-size:32px;line-height:1.25;font-weight:400;max-width:560px}
.attr{margin-top:18px;font-family:var(--ff-mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;opacity:0.7}
</style></head>
<body>
<div class="q">
<blockquote>We replaced four tools and shipped onboarding in a week.</blockquote>
<div class="attr">— VP of Learning · Fortune 500 retailer · Lora Italic</div>
</div>
</body></html>
