<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#F6F5F2;font-family:var(--ff-body)}
table{border-collapse:collapse;width:100%}
td{padding:10px 12px;border-bottom:1px solid #E1DBD2;vertical-align:middle;color:#0033A0}
td.spec{font-family:var(--ff-mono);font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:#56534E;width:160px}
.disp-r{font-family:'Special Gothic Expanded One',serif;font-style:normal}
.disp-i{font-family:'Special Gothic Expanded One',serif;font-style:italic}
.body{font-family:'Figtree',sans-serif}
.serif{font-family:'Lora',serif;font-style:italic}
.mono{font-family:'IBM Plex Mono',monospace}
</style></head>
<body class="phx-base">
<table>
<tr><td class="spec">Special Gothic — italic</td><td class="disp-i" style="font-size:28px">Train smarter. Win bigger.</td></tr>
<tr><td class="spec">Figtree · 400 / 500 / 700</td><td><span class="body" style="font-weight:400">Regular </span><span class="body" style="font-weight:500">Medium </span><span class="body" style="font-weight:700">Bold</span></td></tr>
<tr><td class="spec">Lora · italic 400</td><td class="serif" style="font-size:18px">"For the AI era of L&amp;D."</td></tr>
<tr><td class="spec">IBM Plex Mono · 600</td><td class="mono" style="font-size:13px;letter-spacing:0.06em;text-transform:uppercase">SEE THE DATA →</td></tr>
<tr><td class="spec">Mulish · banner fallback</td><td class="body" style="font-family:'Mulish';font-weight:800;font-size:30px">DOCEBO PHOENIX</td></tr>
</table>
</body></html>
