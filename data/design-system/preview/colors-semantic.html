<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;background:#0033A0;color:#fff;font-family:var(--ff-body);height:100%}
.wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cell{padding:18px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10)}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle}
.label{font-family:var(--ff-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.5;margin-bottom:4px}
.val{font-family:var(--ff-mono);font-size:13px}
</style></head>
<body>
<div class="wrap">
<div class="cell"><div class="label">Bg / Dark</div><div class="val"><span class="dot" style="background:#0033A0"></span>--bg-1 navy</div></div>
<div class="cell"><div class="label">Bg / Beige</div><div class="val"><span class="dot" style="background:#E6DACB"></span>--bg-3 marble-10</div></div>
<div class="cell"><div class="label">Accent · Pink</div><div class="val"><span class="dot" style="background:#FF5DD8"></span>--accent-pink</div></div>
<div class="cell"><div class="label">Accent · Green</div><div class="val"><span class="dot" style="background:#54FA77"></span>--accent-green</div></div>
<div class="cell"><div class="label">Accent · Lavender</div><div class="val"><span class="dot" style="background:#DCB7FF"></span>--accent-lavender</div></div>
<div class="cell"><div class="label">Accent · Purple</div><div class="val"><span class="dot" style="background:#7E2EE9"></span>--accent-purple</div></div>
</div>
</body></html>
